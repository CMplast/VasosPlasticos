<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedido de Vasos</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🛒 Pedido de Vasos</h1>

<h2 class="aviso">
⚠️ El pedido es por caja, cada caja trae 100 unidades
</h2>

<div class="panel">

<label>Tamaño del vaso</label>

<select id="tamano" onchange="cambiarTapa()">
<option value="400">400 ml</option>
<option value="500">500 ml</option>
</select>

<label>Tipo de vaso</label>

<select class="tipo" onchange="controlarModoGlitter()">
<option value="Comun">Común</option>
<option value="Glitter">Glitter</option>
</select>

<label>Tipo de tapa</label>

<select id="tapaSelect">
<option value="">Sin tapa</option>
<option value="Tapa plana">Tapa plana</option>
<option value="Tapa domo">Tapa domo</option>
<option value="Tapa pelota">Tapa pelota</option>
</select>

</div>

<h2>Colores</h2>

<div id="coloresUnico" class="coloresGrid"></div>

<div class="botones">

<button onclick="guardarPedido()">Agregar al pedido</button>

<button onclick="borrarPedido()" class="danger">
Borrar todo
</button>

</div>

<div class="pedidoActual">

<h2>Pedido actual</h2>

<div id="listaPedido">
Aún no hay productos
</div>

<button onclick="enviarWhatsApp()" class="whatsapp">
Enviar pedido por WhatsApp
</button>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modalContenido">

<p id="modalTexto"></p>

<div class="modalBotones">

<button id="modalAceptar">Aceptar</button>

<button id="modalCancelar">Cancelar</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
